<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 1 — The Invisible Switch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <p class="module-tag">Declarative Foundations · Module 1</p>

    <input type="checkbox" id="secret-switch" class="hidden-state">

    <label for="secret-switch" class="trigger-button">Click to Open Vault</label>

    <div class="secret-panel">
        <h2>Vault Unlocked</h2>
        <p>You have accessed the secure data without any scripts.</p>
        <label for="secret-switch" class="trigger-button secondary">Close Vault</label>
    </div>

</body>
</html>
