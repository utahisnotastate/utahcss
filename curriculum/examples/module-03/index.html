<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 3 — The Bouncer at the Door</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <p class="module-tag">Declarative Foundations · Module 3</p>

    <form class="secure-form">
        <h3>Enter Secure Code</h3>

        <div class="input-container">
            <input
                type="password"
                id="vault-pass"
                class="smart-input"
                placeholder=" "
                pattern="^(?=.*[A-Z])(?=.*\d).{8,}$"
                required
            >
            <label for="vault-pass">Password</label>
            <div class="error-alert">Must be 8+ chars, 1 uppercase, 1 number.</div>
        </div>

        <button type="submit" class="submit-btn">Unlock</button>
    </form>

</body>
</html>
